<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special <3</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hearts"></div>

    <div class="card">

        <h1>Haii, Langga Lydell</h1>

        <p class="intro">
            I made something special for you.
            Answer these questions honestly hehe
        </p>

        <h2 id="question">
            Will you be my special someone? 
        </h2>

        <img id="questionGif"
     src="gifs/gif1.gif"
     class="question-gif">

        <div class="buttons">
            <button id="yesBtn">YES</button>
            <button id="noBtn">NO</button>
        </div>


        <div id="letter" class="hidden">

            <div class="paper">

                <h2>A Letter For You</h2>

                <p id="letterText"></p>

                <p class="signature">
                    — Someone who likes you
                </p>

            </div>

            <canvas id="confetti"></canvas>

        </div>

    </div>


<script src="script.js"></script>

</body>
</html>
